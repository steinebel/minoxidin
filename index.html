<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.tracker { padding: 1rem 0; }

.day-header {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 1.25rem;
}
.day-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.day-sub { font-size: 13px; color: var(--color-text-secondary); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 1rem;
}

.card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  user-select: none;
  min-height: 80px;
  display: flex; flex-direction: column; gap: 6px;
}
.card:hover { border-color: var(--color-border-secondary); }

.card-label { font-size: 12px; color: var(--color-text-secondary); }
.card-status { font-size: 22px; font-weight: 500; }

.card.done {
  background: #EAF3DE;
  border-color: #639922;
}
.card.done .card-label { color: #3B6D11; }
.card.done .card-status { color: #27500A; }

.card.missed {
  background: #FCEBEB;
  border-color: #E24B4A;
}
.card.missed .card-label { color: #A32D2D; }
.card.missed .card-status { color: #791F1F; }

.card.skipped {
  background: var(--color-background-secondary);
  border-color: var(--color-border-tertiary);
  opacity: 0.5;
  cursor: default;
}
.card.skipped .card-status { color: var(--color-text-tertiary); }

.card.pending { border-color: var(--color-border-secondary); }

.roller-banner {
  background: #FAEEDA;
  border: 0.5px solid #BA7517;
  border-radius: var(--border-radius-lg);
  padding: 10px 14px;
  font-size: 13px;
  color: #633806;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 8px;
}

.nav { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
.nav button {
  font-size: 13px; padding: 4px 12px;
  border-radius: var(--border-radius-md);
}
.nav-date { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; text-align: center; }
#settingsBtn { opacity: 0.4; padding: 4px 8px !important; }
#settingsBtn:hover { opacity: 0.8; }

.save-status {
  font-size: 12px;
  color: var(--color-text-tertiary);
  text-align: right;
  min-height: 18px;
  margin-bottom: 0.75rem;
}
.save-status.error { color: #E24B4A; }
.save-status.saved { color: #639922; }

.legend { font-size: 12px; color: var(--color-text-tertiary); margin-top: 0.75rem; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 3px; }
.dot.green { background: #639922; }
.dot.red { background: #E24B4A; }

/* Token modal */
.token-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 1rem;
}
.token-overlay.hidden { display: none; }

.token-modal {
  background: var(--color-background-primary, #fff);
  border-radius: 14px;
  padding: 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.token-modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--color-text-primary, #111); }
.token-modal p {
  font-size: 13px; color: var(--color-text-secondary, #666);
  margin-bottom: 16px; line-height: 1.5;
}
.token-modal p code {
  background: var(--color-background-secondary, #f4f4f4);
  padding: 1px 4px; border-radius: 4px; font-size: 12px;
}
.token-modal input {
  width: 100%; font-size: 13px;
  padding: 10px 12px;
  border: 1px solid var(--color-border-secondary, #ddd);
  border-radius: 8px;
  margin-bottom: 12px;
  font-family: monospace;
  outline: none;
  color: var(--color-text-primary, #111);
  background: var(--color-background-primary, #fff);
}
.token-modal input:focus { border-color: #639922; }
.token-modal .btn-save {
  width: 100%; padding: 10px;
  background: #639922; color: #fff;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.token-modal .btn-save:hover { background: #4d7a1a; }
.token-modal .token-hint {
  font-size: 11px; color: var(--color-text-tertiary, #aaa);
  margin-top: 10px; display: block; text-align: center;
}
</style>

<!-- Token modal -->
<div class="token-overlay hidden" id="tokenOverlay">
  <div class="token-modal">
    <h2>GitHub Token</h2>
    <p>Нужен Personal Access Token (classic) с правом <code>repo</code> для сохранения данных в репозитории.</p>
    <input type="password" id="tokenInput" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
    <button class="btn-save" id="tokenSaveBtn">Подключить</button>
    <span class="token-hint">Токен хранится только в этом браузере</span>
  </div>
</div>

<div class="tracker">
  <div class="nav">
    <button id="prevBtn">←</button>
    <div class="nav-date" id="navDate"></div>
    <button id="nextBtn">→</button>
    <button id="settingsBtn">⚙</button>
  </div>

  <div class="save-status" id="saveStatus"></div>

  <div id="rollerBanner" class="roller-banner" style="display:none">
    ⚠ Роллер перенесён с 16.03 — запланирован на сегодня вечером
  </div>

  <div class="day-header">
    <div class="day-title" id="dayTitle"></div>
    <div class="day-sub" id="daySub"></div>
  </div>

  <div class="grid" id="cardsGrid"></div>

  <div class="legend">
    <span class="dot green"></span>выполнено &nbsp;
    <span class="dot red"></span>пропущено &nbsp;
    серый — не запланировано
  </div>
</div>

<script>
const OWNER     = 'steinebel';
const REPO      = 'minoxidin';
const FILE      = 'data.json';
const TOKEN_KEY = 'minox_gh_token';

const DAYS_RU   = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS_RU = ['января','февраля','марта','апреля','мая','июня',
                   'июля','августа','сентября','октября','ноября','декабря'];

const START_DATE = new Date(2026, 2, 17);
const ROLLER_DOW = 1;           // Понедельник
const DERCOS_DOW = new Set([1, 3, 6]); // Пн, Ср, Сб

let ghSha    = null;
let appState = { days: {}, vitCount: 33 };
let currentDate = (() => {
  const t = new Date(); t.setHours(0,0,0,0);
  return t < START_DATE ? new Date(START_DATE) : t;
})();

// ── Helpers ───────────────────────────────────────────────────────────
function ymd(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// ── GitHub API ────────────────────────────────────────────────────────
async function ghLoad(token) {
  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
    { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
  );
  if (res.status === 404) { ghSha = null; return { days: {}, vitCount: 33 }; }
  if (!res.ok) throw new Error(`GitHub ${res.status}`);
  const json = await res.json();
  ghSha = json.sha;
  return JSON.parse(atob(json.content.replace(/\s/g, '')));
}

async function ghSave(token, state) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
  const body = { message: 'tracker update', content };
  if (ghSha) body.sha = ghSha;
  const res = await fetch(
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        Accept: 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    }
  );
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub ${res.status}`); }
  const json = await res.json();
  ghSha = json.content.sha;
}

// ── Save status ───────────────────────────────────────────────────────
function setSaveStatus(text, cls) {
  const el = document.getElementById('saveStatus');
  el.textContent = text;
  el.className = 'save-status' + (cls ? ' ' + cls : '');
}

// ── Token modal ───────────────────────────────────────────────────────
function showTokenModal() {
  const stored = localStorage.getItem(TOKEN_KEY);
  if (stored) document.getElementById('tokenInput').value = stored;
  document.getElementById('tokenOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('tokenInput').focus(), 50);
}
function hideTokenModal() {
  document.getElementById('tokenOverlay').classList.add('hidden');
  document.getElementById('tokenInput').value = '';
}

document.getElementById('tokenSaveBtn').addEventListener('click', async () => {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) return;
  setSaveStatus('проверка…', '');
  try {
    appState = await ghLoad(val);
    localStorage.setItem(TOKEN_KEY, val);
    hideTokenModal();
    setSaveStatus('', '');
    render();
  } catch(e) {
    setSaveStatus('Ошибка: ' + e.message, 'error');
  }
});
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('tokenSaveBtn').click();
});
document.getElementById('settingsBtn').addEventListener('click', showTokenModal);
document.getElementById('tokenOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('tokenOverlay')) hideTokenModal();
});

// ── Schedule ──────────────────────────────────────────────────────────
function isRoller(d) {
  const k = ymd(d);
  if (k === '2026-03-17') return true;   // перенос с 16.03
  if (k === '2026-03-16') return false;  // пропущен
  return d.getDay() === ROLLER_DOW;
}
function isPauseDay(d) {
  const prev = new Date(d); prev.setDate(prev.getDate() - 1);
  return isRoller(prev);
}

function getSchedule(date) {
  const dow    = date.getDay();
  const roller = isRoller(date);
  const pause  = !roller && isPauseDay(date);
  return {
    minU:   roller || pause ? 'skip' : 'plan',
    rinfo:  roller || pause ? 'skip' : 'plan',
    dercos: DERCOS_DOW.has(dow) ? 'plan' : 'skip',
    minV:   roller ? 'skip' : 'plan',
    roller: roller ? 'plan' : 'skip',
    vit:    'plan',
  };
}

// ── Vitamins counter ──────────────────────────────────────────────────
function computeVitOnDate(date, state) {
  const targetKey = ymd(date);
  const startKey  = ymd(START_DATE);
  let count = state.vitCount !== undefined ? state.vitCount : 33;
  const cur = new Date(START_DATE);
  while (ymd(cur) <= targetKey) {
    const k = ymd(cur);
    if (k > startKey) {
      const rec = state.days[k];
      if (rec && rec.vit === 'done') count--;
      else if (!rec || !rec.vit) {
        if (k < targetKey) count--; // прогноз для незаписанных дней
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
  return Math.max(0, count);
}

// ── Render ────────────────────────────────────────────────────────────
const ITEMS = [
  { id: 'minU',   label: 'Мин утро' },
  { id: 'rinfo',  label: 'Ринфолтил' },
  { id: 'dercos', label: 'Dercos' },
  { id: 'minV',   label: 'Мин вечер' },
  { id: 'roller', label: 'Роллер' },
  { id: 'vit',    label: 'Витамины' },
];

function render() {
  const key      = ymd(currentDate);
  const sched    = getSchedule(currentDate);
  const rec      = appState.days[key] || {};
  const todayKey = ymd(new Date());
  const isToday  = key === todayKey;
  const isFuture = key > todayKey;

  const dow = DAYS_RU[currentDate.getDay()];
  document.getElementById('dayTitle').textContent =
    currentDate.getDate() + ' ' + MONTHS_RU[currentDate.getMonth()] + ', ' + dow;
  document.getElementById('daySub').textContent =
    isToday ? 'сегодня' : (isFuture ? 'будущее' : 'прошлое');
  document.getElementById('navDate').textContent = key.split('-').reverse().join('.');

  document.getElementById('rollerBanner').style.display =
    key === '2026-03-17' ? 'flex' : 'none';

  const vitBase = computeVitOnDate(currentDate, appState);
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  ITEMS.forEach(item => {
    const plan     = sched[item.id];
    const recVal   = rec[item.id];
    const clickable = !isFuture && plan === 'plan';
    let cls = 'card', statusText = '';

    if (plan === 'skip') {
      cls += ' skipped'; statusText = '—';
    } else if (recVal === 'done') {
      cls += ' done';
      statusText = item.id === 'vit' ? String(vitBase) : '✓';
    } else if (recVal === 'missed') {
      cls += ' missed';
      statusText = item.id === 'vit' ? String(vitBase + 1) : '✗';
    } else {
      cls += ' pending';
      statusText = item.id === 'vit' ? String(vitBase) : '·';
    }

    const card = document.createElement('div');
    card.className = cls;
    card.innerHTML = `<div class="card-label">${item.label}</div><div class="card-status">${statusText}</div>`;
    if (clickable) card.addEventListener('click', () => toggleItem(key, item.id, recVal, plan));
    grid.appendChild(card);
  });
}

// ── Toggle ────────────────────────────────────────────────────────────
async function toggleItem(key, itemId, current, plan) {
  if (plan !== 'plan') return;
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { showTokenModal(); return; }

  if (!appState.days[key]) appState.days[key] = {};

  if (!current || current === 'pending') {
    appState.days[key][itemId] = 'done';
    if (itemId === 'vit' && key === ymd(START_DATE))
      appState.vitCount = Math.max(0, (appState.vitCount || 33) - 1);
  } else if (current === 'done') {
    appState.days[key][itemId] = 'missed';
    if (itemId === 'vit' && key === ymd(START_DATE))
      appState.vitCount = Math.min(99, (appState.vitCount || 33) + 1);
  } else {
    delete appState.days[key][itemId];
  }

  render(); // оптимистичный апдейт

  setSaveStatus('сохраняется…', '');
  try {
    await ghSave(token, appState);
    setSaveStatus('сохранено', 'saved');
    setTimeout(() => setSaveStatus('', ''), 2000);
  } catch(e) {
    setSaveStatus('ошибка: ' + e.message, 'error');
  }
}

// ── Nav ───────────────────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click', () => {
  currentDate = new Date(currentDate); currentDate.setDate(currentDate.getDate() - 1); render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentDate = new Date(currentDate); currentDate.setDate(currentDate.getDate() + 1); render();
});

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { showTokenModal(); return; }
  setSaveStatus('загрузка…', '');
  try {
    appState = await ghLoad(token);
    setSaveStatus('', '');
  } catch(e) {
    setSaveStatus('ошибка загрузки: ' + e.message, 'error');
  }
  render();
}

init();
</script>
